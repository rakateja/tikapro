# About Us
about_title: "Tentang Kami"
about_p1: "Tim di balik Tika memiliki pengalaman lebih dari 10 tahun dalam membangun produk perangkat lunak yang skalabel dan andal. Tim kami membawa keahlian mendalam dari bekerja di perusahaan teknologi terkemuka termasuk <strong>Traveloka</strong>, <strong>GovTech Telkom</strong>, <strong>Amartha Financial</strong>, dan <strong>Sorabel</strong>."
about_p2: "Latar belakang luas dalam pengembangan perangkat lunak enterprise dan solusi fintech memungkinkan kami menghadirkan software akuntansi yang memenuhi kebutuhan bisnis modern."
about_p3: "Perusahaan dan tim kami berbasis di Bali, sehingga kami dapat memberikan waktu respons yang cepat dan jam dukungan yang nyaman bagi bisnis di seluruh kawasan."

